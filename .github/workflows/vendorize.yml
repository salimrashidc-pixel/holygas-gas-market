name: Vendorize chart library (run once)
on:
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  vendorize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Get Chart.js from npm registry
        run: |
          mkdir -p vendor
          npm pack chart.js@4.4.4
          tar -xzf chart.js-4.4.4.tgz
          cp package/dist/chart.umd.js vendor/chart.umd.min.js
          rm -rf package chart.js-*.tgz
          ls -la vendor/
          echo "" > .nojekyll
          git config user.name "holygas-bot"
          git config user.email "bot@holygas.co"
          git add -A
          git diff --cached --quiet || git commit -m "vendor: self-host chart library (npm)"
          git push
